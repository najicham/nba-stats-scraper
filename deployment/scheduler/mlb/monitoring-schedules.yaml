# Cloud Scheduler Jobs for MLB Monitoring
# These schedules trigger monitoring jobs throughout the day.
#
# Path C — silent-failure plumbing. Schedules use `timeZone: "UTC"` so the
# `month=2-11` field is the UTC month (Feb-Nov). This widens the active
# window vs. the league season (late-March through October ET) to cover
# the timezone-edge cases the previous `3-10` lost:
#   - Mar 31 11 PM ET = Apr 1 04:00 UTC — was outside `3-10` for ET-evening
#     fires near Opening Day
#   - Oct 31 11 PM ET = Nov 1 04:00 UTC — similar at season end
# Off-season fires short-circuit (no MLB games → monitoring no-ops), so the
# cost of widening is just a handful of wasted invocations. The alternative
# (flipping timeZone + translating every cron hour from UTC to ET) is a
# higher-risk multi-line rewrite for a small payoff.

---
# Gap Detection - Daily at 8 AM ET (detect overnight processing gaps)
apiVersion: cloudscheduler.googleapis.com/v1
kind: Job
metadata:
  name: mlb-gap-detection-daily
spec:
  schedule: "0 13 * * *"  # 8 AM ET = 1 PM UTC
  timeZone: "America/New_York"
  httpTarget:
    uri: "https://us-west2-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/nba-props-platform/jobs/mlb-gap-detection:run"
    httpMethod: POST
    oauthToken:
      serviceAccountEmail: mlb-monitoring-sa@nba-props-platform.iam.gserviceaccount.com
  retryConfig:
    retryCount: 2
    maxRetryDuration: "600s"
    minBackoffDuration: "60s"
    maxBackoffDuration: "300s"

---
# Freshness Checker - Every 2 hours during season (6 AM - midnight ET)
apiVersion: cloudscheduler.googleapis.com/v1
kind: Job
metadata:
  name: mlb-freshness-checker-hourly
spec:
  schedule: "0 11-5/2 * 2-11 *"  # Every 2 hours, 11 AM - 5 AM UTC (6 AM - midnight ET), March-October (Opening Day is late March)
  timeZone: "UTC"
  httpTarget:
    uri: "https://us-west2-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/nba-props-platform/jobs/mlb-freshness-checker:run"
    httpMethod: POST
    oauthToken:
      serviceAccountEmail: mlb-monitoring-sa@nba-props-platform.iam.gserviceaccount.com
  retryConfig:
    retryCount: 1
    maxRetryDuration: "300s"

---
# Prediction Coverage - 2 hours before typical game time (5 PM ET = 10 PM UTC)
apiVersion: cloudscheduler.googleapis.com/v1
kind: Job
metadata:
  name: mlb-prediction-coverage-pregame
spec:
  schedule: "0 22 * 2-11 *"  # 5 PM ET = 10 PM UTC, March-October (Opening Day is late March)
  timeZone: "UTC"
  httpTarget:
    uri: "https://us-west2-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/nba-props-platform/jobs/mlb-prediction-coverage:run"
    httpMethod: POST
    oauthToken:
      serviceAccountEmail: mlb-monitoring-sa@nba-props-platform.iam.gserviceaccount.com
  retryConfig:
    retryCount: 2
    maxRetryDuration: "300s"

---
# Prediction Coverage - Post-games (2 AM ET = 7 AM UTC)
apiVersion: cloudscheduler.googleapis.com/v1
kind: Job
metadata:
  name: mlb-prediction-coverage-postgame
spec:
  schedule: "0 7 * 2-11 *"  # 2 AM ET = 7 AM UTC, March-October (Opening Day is late March)
  timeZone: "UTC"
  httpTarget:
    uri: "https://us-west2-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/nba-props-platform/jobs/mlb-prediction-coverage:run"
    httpMethod: POST
    oauthToken:
      serviceAccountEmail: mlb-monitoring-sa@nba-props-platform.iam.gserviceaccount.com
  retryConfig:
    retryCount: 1
    maxRetryDuration: "300s"

---
# Stall Detector - Every hour during season (6 AM - midnight ET)
apiVersion: cloudscheduler.googleapis.com/v1
kind: Job
metadata:
  name: mlb-stall-detector-hourly
spec:
  schedule: "0 11-5 * 2-11 *"  # Every hour, 11 AM - 5 AM UTC (6 AM - midnight ET), March-October (Opening Day is late March)
  timeZone: "UTC"
  httpTarget:
    uri: "https://us-west2-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/nba-props-platform/jobs/mlb-stall-detector:run"
    httpMethod: POST
    oauthToken:
      serviceAccountEmail: mlb-monitoring-sa@nba-props-platform.iam.gserviceaccount.com
  retryConfig:
    retryCount: 1
    maxRetryDuration: "300s"

---
# Deployment command:
# gcloud scheduler jobs create http mlb-gap-detection-daily \
#   --location=us-west2 \
#   --schedule="0 13 * * *" \
#   --time-zone="America/New_York" \
#   --uri="https://us-west2-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/nba-props-platform/jobs/mlb-gap-detection:run" \
#   --http-method=POST \
#   --oauth-service-account-email=mlb-monitoring-sa@nba-props-platform.iam.gserviceaccount.com
