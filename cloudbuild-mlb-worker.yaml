# Cloud Build configuration for MLB Prediction Worker
# Builds, pushes, and deploys to Cloud Run (auto-deploy on push to main)
#
# Create the Cloud Build trigger (run once manually):
#   gcloud builds triggers create github \
#     --name="deploy-mlb-prediction-worker" \
#     --repository="projects/nba-props-platform/locations/us-west2/connections/nba-github-connection/repositories/nba-stats-scraper" \
#     --branch-pattern="^main$" \
#     --build-config="cloudbuild-mlb-worker.yaml" \
#     --included-files="predictions/mlb/**,shared/**,ml/**" \
#     --service-account="projects/nba-props-platform/serviceAccounts/github-actions-deploy@nba-props-platform.iam.gserviceaccount.com" \
#     --region="us-west2" \
#     --project="nba-props-platform"

steps:
  # Step 0: Build the Docker image
  # --no-cache ensures fresh source code is always picked up
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-f'
      - 'predictions/mlb/Dockerfile'
      - '-t'
      - 'us-west2-docker.pkg.dev/nba-props-platform/nba-props/mlb-prediction-worker:latest'
      - '-t'
      - 'us-west2-docker.pkg.dev/nba-props-platform/nba-props/mlb-prediction-worker:${SHORT_SHA}'
      - '--build-arg'
      - 'BUILD_COMMIT=${SHORT_SHA}'
      - '.'

  # Step 1: Push the image BEFORE deploying
  # The `images:` section pushes AFTER all steps complete, but
  # `gcloud run deploy --image` pulls from the registry. Without this push,
  # the deploy step would pull the PREVIOUS :latest tag, deploying stale code.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-west2-docker.pkg.dev/nba-props-platform/nba-props/mlb-prediction-worker:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-west2-docker.pkg.dev/nba-props-platform/nba-props/mlb-prediction-worker:${SHORT_SHA}'

  # Step 2: Deploy to Cloud Run
  # CRITICAL: Uses --update-env-vars (NOT --set-env-vars) to preserve existing env vars
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mlb-prediction-worker'
      - '--image'
      - 'us-west2-docker.pkg.dev/nba-props-platform/nba-props/mlb-prediction-worker:latest'
      - '--region'
      - 'us-west2'
      - '--project'
      - 'nba-props-platform'
      - '--update-env-vars'
      - 'BUILD_COMMIT=${SHORT_SHA}'
      - '--update-labels'
      - 'commit-sha=${SHORT_SHA}'

images:
  - 'us-west2-docker.pkg.dev/nba-props-platform/nba-props/mlb-prediction-worker:latest'
  - 'us-west2-docker.pkg.dev/nba-props-platform/nba-props/mlb-prediction-worker:${SHORT_SHA}'

timeout: 1200s

options:
  logging: CLOUD_LOGGING_ONLY
