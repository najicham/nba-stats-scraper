# Signal registry — single source of truth for signal tags + status.
#
# Status values:
#   active      — counts toward real_sc; participates in rescue checks
#   shadow      — observed but does not contribute to real_sc
#   removed     — historical; documents that the tag once existed
#
# When code adds/removes a signal, update this file in the same commit.
# .pre-commit-hooks/validate_signal_references.py validates that every
# signal name mentioned in CLAUDE.md / .claude/skills/ / docs/ is in this file.
#
# Pipeline-state-redesign Phase H.

