# Filter registry — single source of truth for negative filter tags + status.
#
# Status values:
#   active        — blocks picks when condition met
#   observation   — logs but doesn't block (CF HR data accumulating)
#   removed       — historical; documents that the tag once existed
#
# When code adds/removes/demotes a filter, update this file in the same commit.
#
# Pipeline-state-redesign Phase H.

filters:

  - tag: legacy_block
    status: active
    blocks_direction: both
    description: Model in LEGACY_MODEL_BLOCKLIST
    introduced_session: 332

  - tag: blacklist
    status: active
    blocks_direction: both
    description: Player <40% HR on 8+ edge-3+ picks
    introduced_session: 284

  - tag: edge_floor
    status: active
    blocks_direction: both
    description: edge < 3.0
    introduced_session: 352

  - tag: over_edge_floor
    status: active
    blocks_direction: over
    description: OVER + edge < 6.0 (regime-adaptive to 7.0 in TIGHT)
    introduced_session: 522

  - tag: under_edge_7plus
    status: active
    blocks_direction: under
    description: UNDER + edge >= 7 (v9 only)
    introduced_session: 318

  - tag: model_direction_affinity
