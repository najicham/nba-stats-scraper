# Filter registry — single source of truth for negative filter tags + status.
#
# Status values:
#   active        — blocks picks when condition met
#   observation   — logs but doesn't block (CF HR data accumulating)
#   removed       — historical; documents that the tag once existed
#
# When code adds/removes/demotes a filter, update this file in the same commit.
#
# Pipeline-state-redesign Phase H.

