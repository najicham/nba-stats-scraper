# Cloud Build configuration for Phase 4 Precompute Processors.
#
# Path C — silent infra debt. Previously this file only built + pushed the
# image, with no `gcloud run deploy` step. The `nba-phase4-precompute-processors`
# Cloud Run service stayed pinned to whatever revision was last manually
# deployed via `bin/deploy-service.sh`, so every push silently produced a
# stale-code service. Aligns with `cloudbuild-nba-phase2.yaml` pattern
# (Sessions 516/520 traffic routing fix).

steps:
  # Step 0: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nba-phase4-precompute-processors:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nba-phase4-precompute-processors:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nba-phase4-precompute-processors:${SHORT_SHA}'
      - '-f'
      - 'docker/precompute-processor.Dockerfile'
      - '--build-arg'
      - 'BUILD_COMMIT=${SHORT_SHA}'
      - '.'

  # Step 1: Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/nba-phase4-precompute-processors'

  # Step 2: Deploy precompute service
  # CRITICAL: Uses --update-env-vars (NOT --set-env-vars) per CLAUDE.md.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nba-phase4-precompute-processors'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nba-phase4-precompute-processors:${SHORT_SHA}'
      - '--region'
      - 'us-west2'
      - '--project'
      - '$PROJECT_ID'
      - '--update-env-vars'
      - 'BUILD_COMMIT=${SHORT_SHA}'
      - '--update-labels'
      - 'commit-sha=${SHORT_SHA}'

  # Step 3: Route traffic to the latest revision (Session 516 lesson).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run services update-traffic nba-phase4-precompute-processors \
          --to-latest \
          --region us-west2 \
          --project $PROJECT_ID \
          --quiet
        echo "Traffic routed to latest revision for nba-phase4-precompute-processors"

# Images to retain in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/nba-phase4-precompute-processors'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout for build
timeout: '1500s'
