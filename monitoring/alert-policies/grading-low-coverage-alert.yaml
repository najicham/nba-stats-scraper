# Cloud Monitoring Alert Policy — Grading Phase Completion Stuck (Critical)
#
# Path A — silent failures. Fires when `phase_completion` for `phase5b_grading`
# stays below 0.7 (i.e., recent runs are FAILED or DEGRADED) for 2+ hours.
# Drives off the metric emitted by `phase6_export/main.py` + the grading
# CF run-end emit (`emit_phase_completion(phase='phase5b_grading', ...)`).
#
# Replaces the prior stub that had no metric, no threshold, no channel —
# which silently deployed as a no-op.
#
# Deploy with:
#   gcloud alpha monitoring policies create \
#     --policy-from-file=grading-low-coverage-alert.yaml \
#     --project=nba-props-platform

displayName: "[NBA Pipeline] Grading phase stuck in FAILED/DEGRADED (Critical)"
documentation:
  content: |
    ## Grading Phase Stuck

    **Severity:** Critical
    **Impact:** ML model evaluation incomplete; missing training data.

    ### What this means
    `phase_completion{phase="phase5b_grading"}` has stayed below 0.7 for
    2+ hours. Status mapping (see shared/observability/metrics.py):
    COMPLETE/EMPTY_OK = 1.0, RUNNING/EXPECTED = 0.5, DEGRADED = 0.25,
    FAILED = 0.0. A 2h average < 0.7 means recent runs were mostly
    DEGRADED or FAILED.

    ### Immediate actions
    1. Look at recent runs:
       ```bash
       gcloud functions logs read phase5b-grading --region=us-west2 --limit=50
       ```
    2. Check actuals coverage:
       ```sql
       SELECT game_date, COUNT(*) AS rows
       FROM `nba-props-platform.nba_analytics.player_game_summary`
       WHERE game_date BETWEEN DATE_SUB(CURRENT_DATE(), INTERVAL 3 DAY)
         AND DATE_SUB(CURRENT_DATE(), INTERVAL 1 DAY)
       GROUP BY game_date ORDER BY game_date DESC
       ```
       Empty rows = upstream Phase 3 issue, not grading.
    3. Check grading output:
       ```sql
       SELECT game_date, COUNT(*) graded
       FROM `nba-props-platform.nba_predictions.prediction_accuracy`
       WHERE game_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 5 DAY)
         AND prediction_correct IS NOT NULL
       GROUP BY game_date ORDER BY game_date DESC
       ```
    4. If the underlying issue is a Phase 3 503, see runbook.

    ### Reference
    - Runbook: docs/02-operations/runbooks/observability-alerts.md
    - Metrics emitter: shared/observability/metrics.py
    - Troubleshooting: docs/02-operations/troubleshooting-matrix.md
  mimeType: text/markdown

conditions:
  - displayName: "phase5b_grading completion < 0.7 for 2h"
    conditionThreshold:
      filter: |
        metric.type="custom.googleapis.com/nba_pipeline/phase_completion"
        metric.labels.phase="phase5b_grading"
        resource.type="global"
      aggregations:
        - alignmentPeriod: 600s   # 10 min buckets
          perSeriesAligner: ALIGN_MEAN
      comparison: COMPARISON_LT
      thresholdValue: 0.7
      duration: 7200s   # Must persist 2h — protects against transient FAILED runs

combiner: OR

enabled: true

alertStrategy:
  autoClose: 604800s  # 7 days

# NBA Platform Alerts (Slack) — shared channel with expected-output-overdue.
notificationChannels:
  - projects/nba-props-platform/notificationChannels/13444328261517403081
